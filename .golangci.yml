# This file contains all available configuration options
# with their default values.

version: "2"

# output configuration options
output:
  formats:
    text:
      colors: true

linters:
  enable:
    - bodyclose
    - dogsled
    - dupl
    - errcheck
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - whitespace
  settings:
    funlen:
      lines: 120
      statements: 120
    dupl:
      threshold: 200
    gocognit:
      min-complexity: 32
    gosec:
      excludes:
        - G115
    staticcheck:
      checks:
        - "all"
        - "-QF*"
  exclusions:
    # Disable default exclude patterns so all issues are reported.
    presets: []
    rules:
      - path: (.+)_test.go
        linters:
          - funlen
          - gochecknoglobals
          - gocritic
          - gocognit
          - dupl
          - gosec
          - revive

issues:
  # Maximum issues count per one linter. Set to 0 to disable. Default is 50.
  max-issues-per-linter: 0
  # Maximum count of issues with the same text. Set to 0 to disable. Default is 3.
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
